<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLsite 深度鏈結工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
            line-height: 1.6;
        }

        .features {
            display: grid;
            gap: 20px;
            margin-bottom: 40px;
            text-align: left;
        }

        .feature {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .feature h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 18px;
        }

        .feature p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 DLsite 深度鏈結工具</h1>
        <p class="subtitle">
            快速生成 DLsite 深度鏈結,支援加速器自動跳轉
        </p>

        <div class="features">
            <div class="feature">
                <h3>📝 轉換頁面</h3>
                <p>將任何 DLsite 網址轉換為支援深度鏈結的跳轉網址,方便分享給使用加速器的用戶。</p>
            </div>

            <div class="feature">
                <h3>🚀 智能跳轉</h3>
                <p>自動檢測 DLsite 加速器,若已安裝則直接開啟應用程式,未安裝則提供手動選項。</p>
            </div>

            <div class="feature">
                <h3>📱 跨平台支援</h3>
                <p>支援 Android 和 Windows 平台的 DLsite 加速器深度鏈結。</p>
            </div>
        </div>

        <div class="buttons">
            <a href="converter.html" class="btn btn-primary">
                開始使用 - 生成跳轉連結
            </a>
        </div>

        <div class="footer">
            <p>© 2026 DLsite 深度鏈結工具 | 支援 DLsite Booster</p>
        </div>
    </div>
</body>
</html>
