version: '3.8'

services:
  dlsite-redirect:
    build: .
    container_name: dlsite-redirect-tool
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      # 如果需要自定義配置，可以掛載配置檔案
      # - ./nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL 證書掛載 (可選)
      # - ./ssl:/etc/nginx/ssl:ro
    networks:
      - webnet
    labels:
      - "com.example.description=DLsite Deep Link Redirect Tool"
      - "com.example.version=1.0"

networks:
  webnet:
    driver: bridge
