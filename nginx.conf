# DLsite 深度鏈結工具 - Nginx 配置
# 放置位置: /etc/nginx/sites-available/dlsite-redirect

server {
    listen 80;
    listen [::]:80;
    
    # 替換為你的域名
    server_name your-domain.com www.your-domain.com;
    
    # 網站根目錄
    root /var/www/dlsite-redirect-tool;
    index index.html;

    # 日誌檔案
    access_log /var/log/nginx/dlsite-redirect-access.log;
    error_log /var/log/nginx/dlsite-redirect-error.log;

    # Gzip 壓縮
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # 主要位置配置
    location / {
        try_files $uri $uri/ =404;
    }

    # 靜態資源快取
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # HTML 檔案不快取
    location ~* \.(html)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # 安全性標頭
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 禁止訪問隱藏檔案
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

